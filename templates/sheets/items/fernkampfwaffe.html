{{log 'fernkampfwaffe' this}}
<form class="{{cssClass}}">
    <div>
        <div>
            <header class="sheet-header">
                <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
                <div class="header-fields">
                    <h1 class="charname">
                        <input name="name" type="text" value="{{item.name}}" />
                    </h1>
                </div>
            </header>
        </div>
        <div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Schaden: </b></label>
                <div class="flexrow">
                    <input
                        name="system.dice_anzahl"
                        value="{{item.system.dice_anzahl}}"
                        type="text"
                        data-dtype="String"
                    />
                    <label class="flex-fest-var" style="flex-basis: 40px">d6+</label>
                    <input
                        name="system.dice_plus"
                        value="{{item.system.dice_plus}}"
                        type="text"
                        data-dtype="String"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Fertigkeit: </b></label>
                <div class="flexrow">
                    <input
                        name="system.fertigkeit"
                        value="{{item.system.fertigkeit}}"
                        type="text"
                        data-dtype="String"
                    />
                    <label class="flex-fest-var" style="flex-basis: 40px"><b>Talent: </b></label>
                    <input
                        name="system.talent"
                        value="{{item.system.talent}}"
                        type="text"
                        data-dtype="String"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>WM: </b></label>
                <div class="flexrow">
                    <input
                        name="system.wm_fk"
                        value="{{item.system.wm_fk}}"
                        type="text"
                        data-dtype="String"
                    />
                    <label class="flex-fest-var" style="flex-basis: 30px"><b>RW: </b></label>
                    <input
                        name="system.rw"
                        value="{{item.system.rw}}"
                        type="text"
                        data-dtype="String"
                    />
                    <label class="flex-fest-var" style="flex-basis: 30px"><b>LZ: </b></label>
                    <input
                        name="system.lz"
                        value="{{item.system.lz}}"
                        type="text"
                        data-dtype="String"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Härte: </b></label>
                <div class="flexrow">
                    <input
                        name="system.haerte"
                        value="{{item.system.haerte}}"
                        type="text"
                        data-dtype="String"
                    />
                    <label class="flex-fest-var" style="flex-basis: 100px"
                        ><b>Beschädigung: </b></label
                    >
                    <input
                        name="system.beschaedigung"
                        value="{{item.system.beschaedigung}}"
                        type="text"
                        data-dtype="String"
                    />
                </div>
            </div>
            <!-- "kein_reiter": false,
                 "niederwerfen": false,
                 "niederwerfen_4": false,
                 "niederwerfen_8": false,
                 "schwer_4": false,
                 "schwer_8": false,
                 "stationaer": false,
                 "stumpf": false,
                 "umklammern_212": false,
                 "umklammern_416": false,
                 "umklammern_816": false,
                 "zweihaendig": false -->
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"
                    ><b>Eigenschaften: </b></label
                >
                <div>
                    <span>
                        <label>| Nicht für Reiter: </label>
                        <input
                            name="system.eigenschaften.kein_reiter"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.kein_reiter}}
                        />
                    </span>
                    <span>
                        <label>| Niederwerfen: </label>
                        <input
                            name="system.eigenschaften.niederwerfen"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.niederwerfen}}
                        />
                    </span>
                    <span>
                        <label>| Niederwerfen (-4): </label>
                        <input
                            name="system.eigenschaften.niederwerfen_4"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.niederwerfen_4}}
                        />
                    </span>
                    <span>
                        <label>| Niederwerfen (-8): </label>
                        <input
                            name="system.eigenschaften.niederwerfen_8"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.niederwerfen_8}}
                        />
                    </span>
                    <span>
                        <label>| Schwer (4): </label>
                        <input
                            name="system.eigenschaften.schwer_4"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.schwer_4}}
                        />
                    </span>
                    <span>
                        <label>| Schwer (8): </label>
                        <input
                            name="system.eigenschaften.schwer_8"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.schwer_8}}
                        />
                    </span>
                    <span>
                        <label>| Stationär: </label>
                        <input
                            name="system.eigenschaften.stationaer"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.stationaer}}
                        />
                    </span>
                    <span>
                        <label>| Stumpf: </label>
                        <input
                            name="system.eigenschaften.stumpf"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.stumpf}}
                        />
                    </span>
                    <span>
                        <label>| Umklammern (2,12): </label>
                        <input
                            name="system.eigenschaften.umklammern_212"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.umklammern_212}}
                        />
                    </span>
                    <span>
                        <label>| Umklammern (4,16): </label>
                        <input
                            name="system.eigenschaften.umklammern_416"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.umklammern_416}}
                        />
                    </span>
                    <span>
                        <label>| Umklammern (8,16): </label>
                        <input
                            name="system.eigenschaften.umklammern_816"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.umklammern_816}}
                        />
                    </span>
                    <span>
                        <label>| Zweihändig: </label>
                        <input
                            name="system.eigenschaften.zweihaendig"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.zweihaendig}}
                        />
                    </span>
                </div>
            </div>
            {{#if hasOwner}}
            <label class="flex-fest-var" style="flex-basis: 100px"><b>Eigene Mod.: </b></label>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>WM: </b></label>
                <input
                    name="system.mod_fk"
                    value="{{item.system.mod_fk}}"
                    type="text"
                    data-dtype="Number"
                />
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"
                    ><b>Schadensbonus: </b></label
                >
                <input
                    name="system.mod_schaden"
                    value="{{item.system.mod_schaden}}"
                    type="text"
                    data-dtype="String"
                />
            </div>
            {{/if}}
            <label><b>Beschreibung: </b></label>
            <textarea name="system.text">{{item.system.text}}</textarea>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"
                    ><b>{{get_label "gewicht"}}: </b></label
                >
                <input
                    name="system.gewicht"
                    value="{{item.system.gewicht}}"
                    type="text"
                    data-dtype="Number"
                />
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Preis: </b></label>
                <input
                    name="system.preis"
                    value="{{item.system.preis}}"
                    type="text"
                    data-dtype="Number"
                />
                <label class="flex-fest-var" style="flex-basis: 100px"><b>ST </b></label>
            </div>
            {{#if hasOwner}}
            <label class="flex-fest-var" style="flex-basis: 100px"><b>Aufbewahrungsort: </b></label>
            <select name="system.aufbewahrungs_ort">
                {{#select item.system.aufbewahrungs_ort}} {{#each speicherplatz_list as |ort|}}
                <option value="{{ort}}">{{ort}}</option>
                {{/each}} {{/select}}
            </select>
            {{/if}}
        </div>
    </div>
</form>
