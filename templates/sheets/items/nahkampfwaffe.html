{{log 'nahkampfwaffe' this}}
<form class="{{cssClass}}">
    <div>
        <div>
            <header class="sheet-header">
                <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
                <div class="header-fields">
                    <h1 class="charname">
                        <input name="name" type="text" value="{{item.name}}" />
                    </h1>
                </div>
            </header>
        </div>
        <div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Schaden: </b></label>
                <div class="flexrow">
                    <input
                        name="system.dice_anzahl"
                        value="{{item.system.dice_anzahl}}"
                        type="text"
                        data-dtype="Number"
                    />
                    <label class="flex-fest-var" style="flex-basis: 40px">d6+</label>
                    <input
                        name="system.dice_plus"
                        value="{{item.system.dice_plus}}"
                        type="text"
                        data-dtype="Number"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Fertigkeit: </b></label>
                <div class="flexrow">
                    <input
                        name="system.fertigkeit"
                        value="{{item.system.fertigkeit}}"
                        type="text"
                        data-dtype="String"
                    />
                    <label class="flex-fest-var" style="flex-basis: 40px"><b>Talent: </b></label>
                    <input
                        name="system.talent"
                        value="{{item.system.talent}}"
                        type="text"
                        data-dtype="String"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>WM: </b></label>
                <div class="flexrow">
                    <input
                        name="system.wm_at"
                        value="{{item.system.wm_at}}"
                        type="text"
                        data-dtype="Number"
                    />
                    <label class="flex-fest-var" style="flex-basis: 1px"><b>/</b></label>
                    <input
                        name="system.wm_vt"
                        value="{{item.system.wm_vt}}"
                        type="text"
                        data-dtype="Number"
                    />
                    <label class="flex-fest-var" style="flex-basis: 30px"><b>RW: </b></label>
                    <input
                        name="system.rw"
                        value="{{item.system.rw}}"
                        type="text"
                        data-dtype="Number"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Härte: </b></label>
                <div class="flexrow">
                    <input
                        name="system.haerte"
                        value="{{item.system.haerte}}"
                        type="text"
                        data-dtype="Number"
                    />
                    <label class="flex-fest-var" style="flex-basis: 100px"
                        ><b>Beschädigung: </b></label
                    >
                    <input
                        name="system.beschaedigung"
                        value="{{item.system.beschaedigung}}"
                        type="text"
                        data-dtype="Number"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"
                    ><b>Eigenschaften: </b></label
                >
                <div>
                    <span>
                        <label>| Kopflastig: </label>
                        <input
                            name="system.eigenschaften.kopflastig"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.kopflastig}}
                        />
                    </span>
                    <span>
                        <label>| Niederwerfen: </label>
                        <input
                            name="system.eigenschaften.niederwerfen"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.niederwerfen}}
                        />
                    </span>
                    <span>
                        <label>| Parierwaffe: </label>
                        <input
                            name="system.eigenschaften.parierwaffe"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.parierwaffe}}
                        />
                    </span>
                    <span>
                        <label>| Reittier: </label>
                        <input
                            name="system.eigenschaften.reittier"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.reittier}}
                        />
                    </span>
                    <span>
                        <label>| Rüstungsbrechend: </label>
                        <input
                            name="system.eigenschaften.ruestungsbrechend"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.ruestungsbrechend}}
                        />
                    </span>
                    <span>
                        <label>| Schild: </label>
                        <input
                            name="system.eigenschaften.schild"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.schild}}
                        />
                    </span>
                    <span>
                        <label>| Schwer (4): </label>
                        <input
                            name="system.eigenschaften.schwer_4"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.schwer_4}}
                        />
                    </span>
                    <span>
                        <label>| Schwer (8): </label>
                        <input
                            name="system.eigenschaften.schwer_8"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.schwer_8}}
                        />
                    </span>
                    <span>
                        <label>| Stumpf: </label>
                        <input
                            name="system.eigenschaften.stumpf"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.stumpf}}
                        />
                    </span>
                    <span>
                        <label>| Unberechenbar: </label>
                        <input
                            name="system.eigenschaften.unberechenbar"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.unberechenbar}}
                        />
                    </span>
                    <span>
                        <label>| Unzerstörbar: </label>
                        <input
                            name="system.eigenschaften.unzerstoerbar"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.unzerstoerbar}}
                        />
                    </span>
                    <span>
                        <label>| Wendig: </label>
                        <input
                            name="system.eigenschaften.wendig"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.wendig}}
                        />
                    </span>
                    <span>
                        <label>| Zerbrechlich: </label>
                        <input
                            name="system.eigenschaften.zerbrechlich"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.zerbrechlich}}
                        />
                    </span>
                    <span>
                        <label>| Zweihändig: </label>
                        <input
                            name="system.eigenschaften.zweihaendig"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.zweihaendig}}
                        />
                    </span>
                    <span>
                        <label>| Kein Malus Nebenwaffe: </label>
                        <input
                            name="system.eigenschaften.kein_malus_nebenwaffe"
                            data-dtype="Boolean"
                            type="checkbox"
                            {{checked
                                item.system.eigenschaften.kein_malus_nebenwaffe}}
                        />
                    </span>
                </div>
            </div>
            {{#if hasOwner}}
            <label class="flex-fest-var" style="flex-basis: 100px"><b>Eigene Mod.: </b></label>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>WM: </b></label>
                <div class="flexrow">
                    <input
                        name="system.mod_at"
                        value="{{item.system.mod_at}}"
                        type="text"
                        data-dtype="Number"
                    />
                    <label class="flex-fest-var" style="flex-basis: 1px"><b>/</b></label>
                    <input
                        name="system.mod_vt"
                        value="{{item.system.mod_vt}}"
                        type="text"
                        data-dtype="Number"
                    />
                </div>
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"
                    ><b>Schadensbonus: </b></label
                >
                <input
                    name="system.mod_schaden"
                    value="{{item.system.mod_schaden}}"
                    type="text"
                    data-dtype="String"
                />
            </div>
            {{/if}}
            <label><b>Beschreibung: </b></label>
            <textarea rows="6" name="system.text">{{item.system.text}}</textarea>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"
                    ><b>{{get_label "gewicht"}}: </b></label
                >
                <input
                    name="system.gewicht"
                    value="{{item.system.gewicht}}"
                    type="text"
                    data-dtype="Number"
                />
            </div>
            <div class="flexrow">
                <label class="flex-fest-var" style="flex-basis: 100px"><b>Preis: </b></label>
                <input
                    name="system.preis"
                    value="{{item.system.preis}}"
                    type="text"
                    data-dtype="Number"
                />
                <label class="flex-fest-var" style="flex-basis: 100px"><b>ST </b></label>
            </div>
            {{#if hasOwner}}
            <label class="flex-fest-var" style="flex-basis: 100px"><b>Aufbewahrungsort: </b></label>
            <select name="system.aufbewahrungs_ort">
                {{#select item.system.aufbewahrungs_ort}} {{#each speicherplatz_list as |ort|}}
                <option value="{{ort}}">{{ort}}</option>
                {{/each}} {{/select}}
            </select>
            {{/if}}
        </div>
    </div>
</form>
